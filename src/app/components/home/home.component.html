<h2>Random Movies</h2>
<div class="movies-grid">
    <div class="movie-card" *ngFor="let movie of randomMovies" (click)="viewMovieDetails(movie.id)">
        <img [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" alt="{{ movie.title }}">
        <div class="movie-info">
            <h3>{{ movie.title }}</h3>
            <p>⭐ {{ movie.vote_average }} / 10</p>
        </div>
    </div>
</div>

<h2>Random TV Shows</h2>
<div class="tvs-grid">
    <div class="tv-card" *ngFor="let tv of randomTVShows" (click)="viewTVShowDetails(tv.id)">
        <img [src]="'https://image.tmdb.org/t/p/w500' + tv.poster_path" alt="{{ tv.name }}">
        <div class="tv-info">
            <h3>{{ tv.name }}</h3>
            <p>⭐ {{ tv.vote_average }} / 10</p>
        </div>
    </div>
</div>
